<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAI Circle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #ffffff;
      --surf:  #f8f8f8;
      --surf2: #f0f0f0;
      --bdr:   #e0e0e0;
      --acc:   #d8e1e6;
      --tx:    #000000;
      --mut:   #666666;
      --green: #2d5a3d;
      --amber: #8a5a00;
      --red:   #8a0000;
      --hf:    'Old Standard TT', Georgia, serif;
      --bf:    'Source Sans 3', sans-serif;
    }

    body.dark {
      --bg:    #111111;
      --surf:  #1a1a1a;
      --surf2: #222222;
      --bdr:   #333333;
      --acc:   #2a3a40;
      --tx:    #f0f0f0;
      --mut:   #999999;
      --green: #5aad7a;
      --amber: #c89030;
      --red:   #c05050;
    }

    html, body { min-height: 100%; background: var(--bg); color: var(--tx); font-family: var(--bf); font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    #screen-app { min-height: 100vh; background: var(--bg); }
    #view-map { width:100%; }
    h1,h2,h3 { font-family: var(--hf); }
    button { cursor: pointer; font-family: var(--bf); }
    input, select, textarea { font-family: var(--bf); }

    /* Header */
    .header { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:54px; background:var(--surf); border-bottom:1px solid var(--bdr); position:sticky; top:0; z-index:100; }
    .logo-sub  { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--mut); display:block; }
    .logo-name { font-family:var(--hf); font-size:22px; font-weight:700; color:var(--tx); display:block; line-height:1.1; }
    .header-right { display:flex; align-items:center; gap:10px; }

    /* Buttons */
    .btn { padding:7px 18px; font-size:13px; font-weight:500; border:1px solid var(--bdr); background:var(--acc); color:var(--tx); transition:opacity .15s; }
    .btn:hover { opacity:.8; }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .btn-ghost { background:transparent; color:var(--mut); }
    .btn-sm { padding:4px 12px; font-size:12px; }
    .theme-btn { width:32px; height:32px; border:1px solid var(--bdr); background:transparent; color:var(--tx); font-size:15px; display:flex; align-items:center; justify-content:center; }
    .theme-btn:hover { background:var(--surf2); }

    /* Auth */
    .auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .auth-card { background:var(--surf); border:1px solid var(--bdr); padding:40px; width:100%; max-width:360px; }
    .auth-logo { text-align:center; margin-bottom:30px; }
    .auth-logo .logo-name { font-size:32px; }

    /* Fields */
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:11px; font-weight:600; color:var(--mut); letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; }
    .field input, .field select, .field textarea { width:100%; padding:9px 12px; background:var(--bg); border:1px solid var(--bdr); color:var(--tx); font-size:14px; outline:none; transition:border-color .15s; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--tx); }
    .field textarea { min-height:80px; resize:vertical; }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    /* Messages */
    .msg-error   { background:#fde8e8; color:#8a0000; font-size:13px; padding:8px 12px; margin-bottom:14px; border-left:3px solid #8a0000; }
    .msg-success { background:#e8f5e9; color:#2d5a3d; font-size:13px; padding:8px 12px; margin-bottom:14px; border-left:3px solid #2d5a3d; }
    body.dark .msg-error   { background:#2e1c1c; color:#e08080; }
    body.dark .msg-success { background:#1c2e20; color:#7aad88; }

    /* Main */
    .main { max-width:1000px; margin:0 auto; padding:24px 20px; }

    /* Filter bar */
    .filter-bar { display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
    .filter-bar select { padding:6px 10px; background:var(--bg); border:1px solid var(--bdr); color:var(--tx); font-size:13px; outline:none; }
    .result-count { font-size:13px; color:var(--mut); margin-left:auto; }

    /* Vendor grid */
    .vendor-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .vendor-card { background:var(--surf); border:1px solid var(--bdr); border-left:4px solid var(--bdr); cursor:pointer; transition:transform .15s,box-shadow .15s; }
    .vendor-card:hover { transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,.08); }
    .vendor-card.score-good { border-left-color:var(--green); }
    .vendor-card.score-mid  { border-left-color:var(--amber); }
    .vendor-card.score-bad  { border-left-color:var(--red); }
    .flag-banner { background:#fef3c7; color:#7a4f00; font-size:11px; font-weight:500; padding:4px 14px; }
    body.dark .flag-banner { background:#2e2010; color:#d4a050; }
    .card-top { padding:14px 16px 10px; }
    .vendor-name { font-family:var(--hf); font-size:18px; font-weight:700; line-height:1.2; }
    .vendor-cat  { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-top:3px; }
    .vendor-addr { font-size:11px; color:var(--mut); margin-top:2px; }
    .card-foot { padding:8px 16px; border-top:1px solid var(--bdr); }
    .card-foot-label { font-size:11px; color:var(--mut); font-style:italic; }

    /* Modal */
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; display:flex; align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto; }
    .modal { background:var(--surf); border:1px solid var(--bdr); width:100%; max-width:500px; animation:fadeUp .2s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .modal-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px 12px; border-bottom:1px solid var(--bdr); }
    .modal-title { font-family:var(--hf); font-size:22px; font-weight:700; }
    .modal-close { background:none; border:none; font-size:24px; color:var(--mut); line-height:1; }
    .modal-close:hover { color:var(--tx); }
    .modal-body   { padding:20px; }
    .modal-footer { display:flex; justify-content:flex-end; gap:10px; padding:12px 20px; border-top:1px solid var(--bdr); }

    /* Detail */
    .back-btn { background:none; border:none; color:var(--mut); font-size:13px; padding:4px 0; margin-bottom:12px; display:inline-block; }
    .back-btn:hover { color:var(--tx); }
    .detail-header { padding-bottom:16px; border-bottom:1px solid var(--bdr); margin-bottom:20px; }
    .detail-cat  { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    .detail-name { font-family:var(--hf); font-size:32px; font-weight:700; line-height:1.15; margin-bottom:10px; }
    .detail-flag { display:inline-block; background:#fef3c7; color:#7a4f00; font-size:12px; padding:4px 12px; margin-bottom:8px; }
    body.dark .detail-flag { background:#2e2010; color:#d4a050; }
    .detail-meta { display:flex; flex-wrap:wrap; gap:14px; font-size:13px; color:var(--mut); }
    .sec-title { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--mut); margin-bottom:12px; }
    .sec-title-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }

    /* Map */
    .map-wrap { display:flex; height:calc(100vh - 54px); width:100%; overflow:hidden; }
    #map { flex:1; min-width:0; min-height:0; z-index:0; width:100%; }
    .map-sidebar { width:260px; flex-shrink:0; background:var(--surf); border-left:1px solid var(--bdr); overflow-y:auto; display:flex; flex-direction:column; }
    .map-sidebar-head { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--mut); padding:12px 16px; border-bottom:1px solid var(--bdr); flex-shrink:0; }
    .map-sidebar-item { padding:10px 16px; border-bottom:1px solid var(--bdr); cursor:pointer; transition:background .1s; }
    .map-sidebar-item:hover { background:var(--surf2); }
    .map-sidebar-item .vname { font-family:var(--hf); font-size:15px; font-weight:700; }
    .map-sidebar-item .vcat  { font-size:10px; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
    .map-sidebar-item .vaddr { font-size:11px; color:var(--mut); margin-top:2px; }
    .no-pin { font-size:10px; color:var(--mut); font-style:italic; margin-top:2px; }

    /* View toggle */
    .view-toggle { display:flex; border:1px solid var(--bdr); overflow:hidden; }
    .view-toggle button { padding:5px 16px; font-size:13px; font-weight:500; border:none; background:transparent; color:var(--mut); transition:all .15s; }
    .view-toggle button.active { background:var(--acc); color:var(--tx); }
    .hidden { display:none !important; }
    .empty { padding:40px 20px; text-align:center; color:var(--mut); font-style:italic; }
    .spinner { display:inline-block; width:22px; height:22px; border:2px solid var(--bdr); border-top-color:var(--tx); border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .flex-center { display:flex; align-items:center; justify-content:center; gap:8px; }
    .mt-16 { margin-top:16px; }
    .auth-hint { font-size:12px; color:var(--mut); text-align:center; margin-top:16px; line-height:1.6; }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="screen-auth" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-sub">Friends of</span>
      <span class="logo-name">CAI Circle</span>
    </div>
    <div id="auth-error" class="msg-error hidden"></div>
    <div class="field">
      <label>Username</label>
      <input id="auth-username" type="text" placeholder="your_username" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input id="auth-password" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" style="width:100%;margin-top:4px" id="auth-submit">Sign In</button>
    <p class="auth-hint">CAI Circle is a private community tool.<br>Contact your administrator for access.</p>
    <div style="text-align:center;margin-top:14px">
      <button class="btn btn-ghost btn-sm" id="auth-theme-btn">☽ Dark mode</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="screen-app" class="hidden">
  <header class="header">
    <div>
      <span class="logo-sub">Friends of</span>
      <span class="logo-name">CAI Circle</span>
    </div>
    <div class="view-toggle">
      <button id="btn-view-list" class="active" onclick="switchView('list')">List</button>
      <button id="btn-view-map" onclick="switchView('map')">Map</button>
    </div>
    <div class="header-right">
      <button class="theme-btn" id="theme-btn">☽</button>
      <button class="btn" id="btn-field-report">Field Report</button>
      <button class="btn btn-ghost btn-sm" id="btn-add-vendor">+ Add Vendor</button>
      <button class="btn btn-ghost btn-sm" id="btn-signout">Sign Out</button>
    </div>
  </header>

  <div class="main">
    <!-- List View -->
    <div id="view-list">
      <div class="filter-bar">
        <select id="filter-cat">
          <option value="all">All Categories</option>
        </select>
        <span class="result-count" id="result-count"></span>
      </div>
      <div id="vendor-grid" class="vendor-grid">
        <div class="empty"><span class="spinner"></span></div>
      </div>
    </div>

    <!-- Detail View -->
    <div id="view-detail" class="hidden">
      <button class="back-btn" id="btn-back">← Back</button>
      <div class="detail-header">
        <div class="detail-cat" id="detail-cat"></div>
        <div class="detail-name" id="detail-name"></div>
        <div id="detail-flag" class="detail-flag hidden"></div>
        <div class="detail-meta" id="detail-meta"></div>
      </div>
      <div class="sec-title-row">
        <div class="sec-title" style="margin-bottom:0">Field Reports</div>
        <button class="btn btn-sm" id="btn-detail-report">+ File a Report</button>
      </div>
      <div id="detail-reports"></div>
    </div>
  </div>

  <!-- Map View — outside .main so it fills full width -->
  <div id="view-map" class="hidden">
    <div class="map-wrap">
      <div id="map">
        <div style="position:absolute;bottom:24px;left:10px;z-index:1000;display:flex;gap:4px">
          <button onclick="setMapTile('light')" id="tile-light" style="padding:5px 12px;font-size:12px;background:#fff;border:1px solid #ccc;cursor:pointer;font-family:var(--bf);box-shadow:0 1px 4px rgba(0,0,0,.2)">Light</button>
          <button onclick="setMapTile('dark')"  id="tile-dark"  style="padding:5px 12px;font-size:12px;background:#fff;border:1px solid #ccc;cursor:pointer;font-family:var(--bf);box-shadow:0 1px 4px rgba(0,0,0,.2)">Dark</button>
          <button onclick="setMapTile('sat')"   id="tile-sat"   style="padding:5px 12px;font-size:12px;background:#fff;border:1px solid #ccc;cursor:pointer;font-family:var(--bf);box-shadow:0 1px 4px rgba(0,0,0,.2)">Satellite</button>
        </div>
      </div>
      <div class="map-sidebar">
        <div class="map-sidebar-head" id="map-sidebar-count">All Vendors</div>
        <div id="map-sidebar-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- ADD VENDOR MODAL -->
<div id="modal-add-vendor" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Vendor</div>
      <button class="modal-close" data-close="modal-add-vendor">×</button>
    </div>
    <div class="modal-body">
      <div id="add-vendor-error" class="msg-error hidden"></div>
      <div class="field">
        <label>Vendor Name *</label>
        <input id="av-name" type="text" placeholder="Company or individual name" />
      </div>
      <div class="field">
        <label>Category *</label>
        <select id="av-cat"></select>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Phone (optional)</label>
          <input id="av-phone" type="text" placeholder="+1 787-555-0000" />
        </div>
        <div class="field">
          <label>Website (optional)</label>
          <input id="av-website" type="text" placeholder="example.com" />
        </div>
      </div>
      <div class="field">
        <label>Address (optional)</label>
        <input id="av-address" type="text" placeholder="Street, City, Region" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close="modal-add-vendor">Cancel</button>
      <button class="btn" id="av-submit">Add Vendor</button>
    </div>
  </div>
</div>

<!-- FIELD REPORT MODAL -->
<div id="modal-field-report" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="fr-modal-title">Field Report</div>
      <button class="modal-close" data-close="modal-field-report">×</button>
    </div>
    <div class="modal-body">
      <div id="fr-error" class="msg-error hidden"></div>
      <!-- Step 1: pick vendor -->
      <div id="fr-step1">
        <div class="field">
          <label>Select Vendor</label>
          <input id="fr-search" type="text" placeholder="Type to filter…" />
        </div>
        <div id="fr-vendor-list" style="max-height:240px;overflow-y:auto;border:1px solid var(--bdr)"></div>
      </div>
      <!-- Step 2: rate -->
      <div id="fr-step2" class="hidden">
        <div id="fr-vendor-selected" style="font-family:var(--hf);font-size:18px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bdr)"></div>
        <div id="fr-dims"></div>
        <div class="field mt-16">
          <label>Comments</label>
          <textarea id="fr-comment" placeholder="Share specifics — what went well, what didn't, anything the group should know…"></textarea>
        </div>
        <div class="field">
          <label>Would you work with this vendor again?</label>
          <div style="display:flex;gap:20px;margin-top:6px">
            <label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer"><input type="radio" name="fr-rec" value="yes" /> Yes</label>
            <label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer"><input type="radio" name="fr-rec" value="no" /> No</label>
          </div>
        </div>
        <div class="field">
          <label>This vendor aligns with permaculture values</label>
          <div style="display:flex;gap:20px;margin-top:6px">
            <label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer"><input type="radio" name="fr-perm" value="yes" /> Yes</label>
            <label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer"><input type="radio" name="fr-perm" value="no" /> No</label>
            <label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer"><input type="radio" name="fr-perm" value="unsure" /> Unsure</label>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close="modal-field-report">Cancel</button>
      <button class="btn" id="fr-submit">Next →</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- FIREBASE + APP LOGIC -->
<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc, query, orderBy, where, serverTimestamp }
                               from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
                               from "https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js";

// ── Firebase config ──────────────────────────────────────────────
const app  = initializeApp({
  apiKey:            "AIzaSyA0J9U7UJCBeqi3n5ELOjhiJesDADTvW-g",
  authDomain:        "cai-circle.firebaseapp.com",
  projectId:         "cai-circle",
  storageBucket:     "cai-circle.firebasestorage.app",
  messagingSenderId: "603183581550",
  appId:             "1:603183581550:web:e0a0cd585b4545e07c197f"
});
const db   = getFirestore(app);
const auth = getAuth(app);

// ════════════════════════════════════════════════════════════════
// CATEGORIES
// To add: copy any block, paste before closing ],
// change id, label, and color. id must be lowercase_underscores.
// ════════════════════════════════════════════════════════════════
const CATEGORIES = [
  // ─── Nursery ────────────────────────────────────────────────
  { id:'nursery',          label:'Nursery',            color:'#2d5a3d' },
  // ─── Rare Plants ────────────────────────────────────────────
  { id:'rare_plants',      label:'Rare Plants',        color:'#5a3d1e' },
  // ─── Testing & Analysis ─────────────────────────────────────
  { id:'testing_analysis', label:'Testing & Analysis', color:'#1e3d5a' },
  // ─── ADD NEW CATEGORIES ABOVE THIS LINE ─────────────────────
];

// ════════════════════════════════════════════════════════════════
// RATING DIMENSIONS
// To add: copy any block, paste before closing ],
// change id and label. id must be lowercase_underscores.
// ════════════════════════════════════════════════════════════════
const RATING_DIMS = [
  // ─── Product / Service Quality ──────────────────────────────
  { id:'quality',       label:'Product / Service Quality', hint:'Did the product or service meet expectations?' },
  // ─── Delivery & Reliability ─────────────────────────────────
  { id:'delivery',      label:'Delivery & Reliability',    hint:'On time, as promised, consistent?' },
  // ─── Value ──────────────────────────────────────────────────
  { id:'value',         label:'Value',                     hint:'Was it worth what you paid?' },
  // ─── Communication ──────────────────────────────────────────
  { id:'communication', label:'Communication',             hint:'Responsive, clear, and honest?' },
  // ─── Business Ethics ────────────────────────────────────────
  { id:'ethics',        label:'Business Ethics',           hint:'Transparent, fair, no shady practices?' },
  // ─── ADD NEW DIMENSIONS ABOVE THIS LINE ─────────────────────
];

// ── Helpers ──────────────────────────────────────────────────────
const toEmail = u => `${u.toLowerCase().replace(/\s+/g,'_')}@caicircle.app`;
const $  = id => document.getElementById(id);
const show = id => $(id).classList.remove('hidden');
const hide = id => $(id).classList.add('hidden');
const showErr = (id,msg) => { $(id).textContent=msg; show(id); };
const hideErr = id => hide(id);

// ── State ─────────────────────────────────────────────────────────
let currentUser=null, currentProfile=null, vendors=[], filterCat='all';
let selectedVendor=null, frSelectedVendor=null, frStep=1, frRatings={};

// ── Theme ─────────────────────────────────────────────────────────
let dark = localStorage.getItem('cai-theme')==='dark';
function applyTheme() {
  document.body.classList.toggle('dark',dark);
  $('theme-btn').textContent      = dark?'☀':'☽';
  $('auth-theme-btn').textContent = dark?'☀ Light mode':'☽ Dark mode';
}
applyTheme();
$('theme-btn').onclick      = () => { dark=!dark; localStorage.setItem('cai-theme',dark?'dark':'light'); applyTheme(); };
$('auth-theme-btn').onclick = () => { dark=!dark; localStorage.setItem('cai-theme',dark?'dark':'light'); applyTheme(); };

// ── Populate dropdowns ────────────────────────────────────────────
CATEGORIES.forEach(c => {
  $('filter-cat').innerHTML += `<option value="${c.id}">${c.label}</option>`;
  $('av-cat').innerHTML     += `<option value="${c.id}">${c.label}</option>`;
});

// ── Screen/view helpers ───────────────────────────────────────────
function showScreen(n) { ['auth','app'].forEach(s => { s===n ? show(`screen-${s}`) : hide(`screen-${s}`); }); }
let currentView = 'list';
let prevView = 'list';
function showView(n) {
  if (n !== 'detail') prevView = n;
  currentView = n;
  ['list','map','detail'].forEach(v => { v===n ? show(`view-${v}`) : hide(`view-${v}`); });
  // .main visibility — hide when map is showing
  const mainEl = document.querySelector('.main');
  if (mainEl) mainEl.style.display = n==='map' ? 'none' : '';
}

// ── Modal helpers ─────────────────────────────────────────────────
const openModal  = id => show(id);
const closeModal = id => hide(id);
document.querySelectorAll('[data-close]').forEach(b => b.onclick = () => closeModal(b.dataset.close));
['modal-add-vendor','modal-field-report'].forEach(id =>
  $(id).addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(id); })
);

// ═══════════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════════
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    const snap = await getDoc(doc(db,'users',user.uid));
    currentProfile = snap.exists() ? snap.data() : { username: user.email.split('@')[0], isAdmin:false };
    showScreen('app');
    loadVendors();
  } else {
    currentUser=null; currentProfile=null;
    showScreen('auth');
  }
});

async function doSignIn() {
  hideErr('auth-error');
  const u = $('auth-username').value.trim();
  const p = $('auth-password').value;
  if (!u||!p) { showErr('auth-error','Please enter your username and password.'); return; }
  $('auth-submit').disabled = true;
  try { await signInWithEmailAndPassword(auth, toEmail(u), p); }
  catch { showErr('auth-error','Invalid username or password.'); $('auth-submit').disabled=false; }
}

$('auth-submit').onclick = doSignIn;
$('auth-username').addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });
$('auth-password').addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });
$('btn-signout').onclick  = () => signOut(auth);

// ═══════════════════════════════════════════════════════════════════
// VENDORS
// ═══════════════════════════════════════════════════════════════════
async function loadVendors() {
  $('vendor-grid').innerHTML = '<div class="empty"><span class="spinner"></span></div>';
  const snap = await getDocs(query(collection(db,'vendors'), orderBy('name')));
  vendors = snap.docs.map(d => ({id:d.id,...d.data()}));
  renderGrid();
  renderMapSidebar();
}

function renderGrid() {
  const f = vendors.filter(v => filterCat==='all' || v.category===filterCat);
  $('result-count').textContent = `${f.length} vendor${f.length!==1?'s':''}`;
  if (!f.length) { $('vendor-grid').innerHTML='<div class="empty">No vendors yet — add the first one!</div>'; return; }
  $('vendor-grid').innerHTML = f.map(v => {
    const cat = CATEGORIES.find(c=>c.id===v.category)||{label:v.category,color:'#888'};
    return `<div class="vendor-card" data-id="${v.id}">
      ${v.flagged?`<div class="flag-banner">⚑ ${v.flaggedReason||'Flagged'}</div>`:''}
      <div class="card-top">
        <div class="vendor-name">${v.name}</div>
        <div class="vendor-cat" style="color:${cat.color}">${cat.label}</div>
        ${v.address?`<div class="vendor-addr">${v.address}</div>`:''}
      </div>
      <div class="card-foot"><span class="card-foot-label">Tap to view field reports →</span></div>
    </div>`;
  }).join('');
  document.querySelectorAll('.vendor-card').forEach(card =>
    card.onclick = () => openDetail(vendors.find(v=>v.id===card.dataset.id))
  );
}

$('filter-cat').onchange = e => { filterCat=e.target.value; renderGrid(); };

// ═══════════════════════════════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════════════════════════════
async function openDetail(v) {
  selectedVendor = v;
  showView('detail');
  const cat = CATEGORIES.find(c=>c.id===v.category)||{label:v.category,color:'#888'};
  $('detail-cat').textContent  = cat.label;
  $('detail-cat').style.color  = cat.color;
  $('detail-name').textContent = v.name;
  const flagEl = $('detail-flag');
  v.flagged ? (flagEl.textContent=`⚑ ${v.flaggedReason||'Flagged'}`, show('detail-flag')) : hide('detail-flag');
  $('detail-meta').innerHTML = [v.phone,v.website,v.address].filter(Boolean).map(m=>`<span>${m}</span>`).join('');

  $('detail-reports').innerHTML = '<div class="flex-center mt-16"><span class="spinner"></span></div>';
  const snap = await getDocs(query(collection(db,'reviews'), where('vendorId','==',v.id), orderBy('createdAt','desc')));
  const reports = snap.docs.map(d=>({id:d.id,...d.data()}));

  if (!reports.length) { $('detail-reports').innerHTML='<div class="empty">No field reports yet. Be the first to share your experience.</div>'; return; }

  $('detail-reports').innerHTML = reports.map(r => {
    const vals = Object.values(r.ratings||{});
    const avg  = vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length):0;
    const col  = avg>=4?'var(--green)':avg>=2.5?'var(--amber)':'var(--red)';
    return `<div style="background:var(--surf);border:1px solid var(--bdr);padding:14px;margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div>
          <span style="font-weight:500;font-size:14px">${r.username||'Anonymous'}</span>
          <span style="font-size:11px;color:var(--mut);margin-left:8px">${r.createdAt?.toDate?.().toLocaleDateString()||''}</span>
        </div>
        <span style="font-family:var(--hf);font-size:18px;font-weight:700;color:${col}">${avg.toFixed(1)} ★</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">
        ${RATING_DIMS.map(d=>r.ratings?.[d.id]?`<span style="font-size:10px;padding:2px 8px;border:1px solid ${r.ratings[d.id]>=4?'var(--green)':r.ratings[d.id]>=2.5?'var(--amber)':'var(--red)'};color:${r.ratings[d.id]>=4?'var(--green)':r.ratings[d.id]>=2.5?'var(--amber)':'var(--red)'}">${d.label.split('/')[0].trim()}: ${r.ratings[d.id]}/5</span>`:'').join('')}
      </div>
      ${r.comment?`<p style="font-size:14px;font-style:italic;line-height:1.6;margin-bottom:8px">"${r.comment}"</p>`:''}
      <span style="font-size:11px;font-weight:500;padding:3px 10px;${r.recommend?'background:#e8f5e9;color:#2d5a3d':'background:#fde8e8;color:#8a0000'}">
        ${r.recommend?'✓ Would work with again':'✗ Would not recommend'}
      </span>
      ${r.permaculture ? `<span style="font-size:11px;font-weight:500;padding:3px 10px;margin-left:6px;${r.permaculture==='yes'?'background:#e8f5e9;color:#2d5a3d':r.permaculture==='no'?'background:#fde8e8;color:#8a0000':'background:#f5f5f5;color:#666'}">
        ${r.permaculture==='yes'?'✓ Permaculture aligned':r.permaculture==='no'?'✗ Not permaculture aligned':'? Permaculture alignment unknown'}
      </span>` : ''}
    </div>`;
  }).join('');
}

$('btn-back').onclick = () => { selectedVendor=null; showView(prevView); if(prevView==='map'){$('btn-view-map').classList.add('active');$('btn-view-list').classList.remove('active');} else {$('btn-view-list').classList.add('active');$('btn-view-map').classList.remove('active');} };
$('btn-detail-report').onclick = () => openFieldReport(selectedVendor);

// ═══════════════════════════════════════════════════════════════════
// ADD VENDOR
// ═══════════════════════════════════════════════════════════════════
$('btn-add-vendor').onclick = () => {
  hideErr('add-vendor-error');
  ['av-name','av-phone','av-website','av-address'].forEach(id => $(id).value='');
  openModal('modal-add-vendor');
};

$('av-submit').onclick = async () => {
  hideErr('add-vendor-error');
  const name = $('av-name').value.trim();
  const cat  = $('av-cat').value;
  if (!name) { showErr('add-vendor-error','Vendor name is required.'); return; }
  $('av-submit').disabled = true;
  try {
    const ref = await addDoc(collection(db,'vendors'), {
      name, category:cat,
      phone:   $('av-phone').value.trim()||null,
      website: $('av-website').value.trim()||null,
      address: $('av-address').value.trim()||null,
      flagged: false, createdBy:currentUser.uid, createdAt:serverTimestamp(),
    });
    vendors.push({id:ref.id,name,category:cat,flagged:false});
    vendors.sort((a,b)=>a.name.localeCompare(b.name));
    renderGrid();
    closeModal('modal-add-vendor');
  } catch(e) { showErr('add-vendor-error',e.message); }
  $('av-submit').disabled = false;
};

// ═══════════════════════════════════════════════════════════════════
// FIELD REPORT
// ═══════════════════════════════════════════════════════════════════
function openFieldReport(preselected=null) {
  frStep=preselected?2:1; frSelectedVendor=preselected; frRatings={};
  $('fr-comment').value='';
  document.querySelectorAll('input[name="fr-rec"]').forEach(r=>r.checked=false);
  document.querySelectorAll('input[name="fr-perm"]').forEach(r=>r.checked=false);
  hideErr('fr-error');
  renderFRStep();
  openModal('modal-field-report');
}

$('btn-field-report').onclick = () => openFieldReport(null);

function renderFRStep() {
  if (frStep===1) {
    show('fr-step1'); hide('fr-step2');
    $('fr-submit').textContent='Next →';
    $('fr-modal-title').textContent='Field Report — Select Vendor';
    renderVendorList($('fr-search').value);
  } else {
    hide('fr-step1'); show('fr-step2');
    $('fr-submit').textContent='Submit Field Report';
    $('fr-modal-title').textContent=`Field Report: ${frSelectedVendor.name}`;
    $('fr-vendor-selected').textContent=frSelectedVendor.name;
    $('fr-dims').innerHTML = RATING_DIMS.map(d=>`
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px">
        <div>
          <div style="font-size:13px">${d.label}</div>
          <div style="font-size:11px;color:var(--mut)">${d.hint}</div>
        </div>
        <div style="display:flex;gap:3px;flex-shrink:0" id="stars-${d.id}">
          ${[1,2,3,4,5].map(n=>`<button type="button" data-dim="${d.id}" data-val="${n}" style="background:none;border:none;font-size:22px;padding:0;line-height:1;cursor:pointer">☆</button>`).join('')}
        </div>
      </div>`).join('');
    $('fr-dims').querySelectorAll('button').forEach(btn =>
      btn.onclick = () => {
        const dim=btn.dataset.dim, val=parseInt(btn.dataset.val);
        frRatings[dim]=val;
        document.querySelectorAll(`#stars-${dim} button`).forEach(b=>b.textContent=parseInt(b.dataset.val)<=val?'★':'☆');
      }
    );
  }
}

$('fr-search').oninput = e => renderVendorList(e.target.value);

function renderVendorList(search='') {
  const f = vendors.filter(v=>!search||v.name.toLowerCase().includes(search.toLowerCase()));
  const list=$('fr-vendor-list');
  if (!f.length) { list.innerHTML='<div class="empty" style="padding:20px">No vendors found.</div>'; return; }
  list.innerHTML = f.map(v=>{
    const cat=CATEGORIES.find(c=>c.id===v.category)||{label:v.category,color:'#888'};
    return `<div data-id="${v.id}" class="fr-vitem" style="padding:12px 16px;border-bottom:1px solid var(--bdr);cursor:pointer;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-family:var(--hf);font-size:15px;font-weight:700">${v.name}</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:${cat.color}">${cat.label}</div>
      </div>
      <span style="color:var(--mut);font-size:18px">→</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.fr-vitem').forEach(item => {
    item.onmouseenter = () => item.style.background='var(--surf2)';
    item.onmouseleave = () => item.style.background='';
    item.onclick = () => { frSelectedVendor=vendors.find(v=>v.id===item.dataset.id); frStep=2; renderFRStep(); };
  });
}

$('fr-submit').onclick = async () => {
  hideErr('fr-error');
  if (frStep===1) { if(!frSelectedVendor){showErr('fr-error','Please select a vendor.');return;} frStep=2;renderFRStep();return; }
  const unrated=RATING_DIMS.filter(d=>!frRatings[d.id]);
  if (unrated.length) { showErr('fr-error','Please rate all dimensions.'); return; }
  const recChecked = document.querySelector('input[name="fr-rec"]:checked');
  const permChecked = document.querySelector('input[name="fr-perm"]:checked');
  if (!recChecked) { showErr('fr-error','Please answer: Would you work with this vendor again?'); return; }
  if (!permChecked) { showErr('fr-error','Please answer: Does this vendor align with permaculture values?'); return; }
  $('fr-submit').disabled=true;
  try {
    await addDoc(collection(db,'reviews'), {
      vendorId:  frSelectedVendor.id,
      userId:    currentUser.uid,
      username:  currentProfile?.username||currentUser.email.split('@')[0],
      ratings:   frRatings,
      comment:   $('fr-comment').value.trim()||null,
      recommend: recChecked.value==='yes',
      permaculture: permChecked.value,
      createdAt: serverTimestamp(),
    });
    closeModal('modal-field-report');
    if (selectedVendor?.id===frSelectedVendor.id) openDetail(selectedVendor);
  } catch(e) { showErr('fr-error', e.message); console.error(e); }
  $('fr-submit').disabled=false;
};

showView('list');

// ═══════════════════════════════════════════════════════════════════
// MAP VIEW
// ═══════════════════════════════════════════════════════════════════
let leafletMap = null;
let currentTileLayer = null;

const TILES = {
  light: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  dark:  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  sat:   'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
};

window.setMapTile = function(type) {
  if (!leafletMap) return;
  if (currentTileLayer) leafletMap.removeLayer(currentTileLayer);
  currentTileLayer = L.tileLayer(TILES[type], {
    attribution: type==='sat' ? '© Esri' : '© OpenStreetMap contributors © CARTO'
  }).addTo(leafletMap);
  // Update button styles
  ['light','dark','sat'].forEach(t => {
    const btn = document.getElementById(`tile-${t}`);
    if (btn) btn.style.fontWeight = t===type ? 'bold' : 'normal';
  });
};

window.switchView = function(v) {
  if (v !== 'detail') prevView = v;
  ['list','map','detail'].forEach(n => hide(`view-${n}`));
  show(`view-${v}`);
  $('btn-view-list').classList.toggle('active', v==='list');
  $('btn-view-map').classList.toggle('active', v==='map');
  if (v==='map') initMap();
};

function initMap() {
  if (leafletMap) {
    leafletMap.invalidateSize();
    renderMapSidebar();
    return;
  }

  leafletMap = L.map('map').setView([18.2208, -66.5901], 9);
  setMapTile('light');
  renderMapPins();
  renderMapSidebar();
}

function renderMapPins() {
  if (!leafletMap) return;
  vendors.forEach(v => {
    if (!v.lat || !v.lng) return;
    const cat = CATEGORIES.find(c=>c.id===v.category)||{color:'#888'};
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${cat.color};border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>`,
      iconSize: [26,26], iconAnchor: [13,26],
    });
    L.marker([v.lat, v.lng], {icon}).addTo(leafletMap)
      .bindPopup(`<div style="font-family:'Old Standard TT',serif;min-width:130px">
        <strong>${v.name}</strong><br>
        <span style="color:${cat.color};font-size:11px;text-transform:uppercase">${cat.label||''}</span>
      </div>`)
      .on('click', () => { openDetail(v); switchView('detail'); });
  });
}

function renderMapSidebar() {
  const list = $('map-sidebar-list');
  $('map-sidebar-count').textContent = `${vendors.length} vendor${vendors.length!==1?'s':''}`;
  if (!vendors.length) { list.innerHTML='<div class="empty" style="padding:20px">No vendors yet.</div>'; return; }
  list.innerHTML = vendors.map(v => {
    const cat = CATEGORIES.find(c=>c.id===v.category)||{label:v.category,color:'#888'};
    return `<div class="map-sidebar-item" data-id="${v.id}">
      <div class="vname">${v.name}</div>
      <div class="vcat" style="color:${cat.color}">${cat.label}</div>
      ${v.address?`<div class="vaddr">${v.address}</div>`:''}
      ${(!v.lat||!v.lng)?'<div class="no-pin">📍 No map pin</div>':''}
    </div>`;
  }).join('');
  list.querySelectorAll('.map-sidebar-item').forEach(item => {
    item.onclick = () => {
      const v = vendors.find(x=>x.id===item.dataset.id);
      if (v) { openDetail(v); switchView('detail'); }
    };
  });
}

// Re-render map when theme changes
const origApplyTheme = window._applyTheme;
</script>
